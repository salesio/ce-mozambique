name: Deploy public site to Verpex

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.VERPEX_FTP_SERVER }}
          username: ${{ secrets.VERPEX_FTP_USERNAME }}
          password: ${{ secrets.VERPEX_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.VERPEX_FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            assets/*.JPG
            assets/*.jpg
            assets/*.jpeg
            assets/*.png
